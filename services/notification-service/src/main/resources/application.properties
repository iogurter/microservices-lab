spring.application.name=notification-service

server.port=8082

########################################
# Kafka
########################################

spring.kafka.bootstrap-servers=192.168.1.77:9092

spring.kafka.consumer.group-id=notification-group-v2

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true

##################################################
# Kafka Consumer JSON
##################################################

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.kafka.consumer.properties.spring.json.trusted.packages=ru.microserviceslab.notificationservice.event

spring.kafka.consumer.properties.spring.json.value.default.type=ru.microserviceslab.events.UserCreatedEvent
