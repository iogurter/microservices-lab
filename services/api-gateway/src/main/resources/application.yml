spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://192.168.1.77:8081
          predicates:
            - Path=/api/v1/users/**

server:
  port: 8088

management:
  endpoints:
    web:
      exposure:
        include: health,info
